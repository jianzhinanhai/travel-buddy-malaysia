<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#123d38"><title>南洋双城 · 家庭私享之旅</title><style>body{margin:0;background:#f7f3ec;font-family:Arial,sans-serif;color:#103b36;display:grid;place-items:center;min-height:100vh}.loading{text-align:center}.spinner{width:34px;height:34px;border:3px solid #dfe9e3;border-top-color:#2d6b62;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="loading"><div class="spinner"></div><div>正在载入行程页面…</div></div><script>(async()=>{try{const files=['payload-01.txt','payload-02.txt','payload-03.txt','payload-04.txt','payload-05.txt'];const b64=(await Promise.all(files.map(u=>fetch(u,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error(u);return r.text()})))).join('');const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const html=await new Response(new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<main style="max-width:680px;padding:32px"><h1>页面载入失败</h1><p>请刷新页面后重试。</p></main>';console.error(e)}})()</script></body></html>
